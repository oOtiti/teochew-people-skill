name: Publish npm package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npmjs.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      - name: Install package metadata
        run: npm ci

      - name: Check release tag matches package version
        if: github.event_name == 'release'
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$release_version" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}."
            exit 1
          fi

      - name: Validate skill structure
        run: npm run validate

      - name: Check npm package contents
        run: npm run pack:check

      - name: Publish package
        run: npm publish --access public --provenance
